<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="Academic portfolio of Dr. Morgan Tide — research in fluid mechanics, coastal dynamics, and synthetic shoreline construction.">
  <link rel="icon" href="assets/images/favicon.ico">

  <!-- Preconnect + Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="data/site.json" as="fetch" crossorigin="anonymous">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Roboto+Flex:opsz,wdth,wght@8..144,25..151,300;8..144,25..151,500;8..144,25..151,700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" media="print">

  <!-- Deferred stylesheets -->
  <link rel="stylesheet" href="css/base/variables.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/base/reset.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/layout/grid.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/components/mobile-menu.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/tailwind.css" media="print" onload="this.media='all'">

  <!-- Critical CSS inlined -->
  <style>
    :root{--surface:#0f1111;--surface-variant:#171a1a;--on-surface:#e5e7eb;--on-surface-muted:#9ca3af;--primary:#94bbf7;--secondary:#a3c978;--outline:rgba(255,255,255,0.08);--outline-hover:rgba(255,255,255,0.16);--transition-speed:0.3s;--font-sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font-display:'Roboto Flex',sans-serif;--header-height:70px}[data-theme="light"]{--surface:#fafafa;--surface-variant:#f1f3f5;--on-surface:#1a1c1e;--on-surface-muted:#64748b;--primary:#1e5088;--secondary:#3b5a1c;--outline:rgba(0,0,0,0.08);--outline-hover:rgba(0,0,0,0.16)}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;transition:background-color var(--transition-speed) ease,border-color var(--transition-speed) ease,color var(--transition-speed) ease}html{scroll-behavior:smooth;scroll-padding-top:var(--header-height)}body{background-color:var(--surface);color:var(--on-surface);font-family:var(--font-sans);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}h1,h2,h3,h4{font-family:var(--font-display);text-transform:uppercase;letter-spacing:-0.02em;line-height:1.1}a{color:var(--primary);text-decoration:none;transition:opacity var(--transition-speed)}a:hover{opacity:0.8}img{max-width:100%;height:auto;display:block}.container{max-width:1200px;margin:0 auto;padding:0 24px}

    nav{position:sticky;top:0;background:rgba(15,17,17,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid var(--outline)}[data-theme="light"] nav{background:rgba(250,250,250,0.8)}.nav-container{display:flex;justify-content:space-between;align-items:center;height:var(--header-height)}.nav-logo{font-family:var(--font-display);font-weight:700;font-size:1.1rem;letter-spacing:0.1em;white-space:nowrap;flex-shrink:0}.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}.nav-links{display:flex;gap:24px;align-items:center;flex-shrink:0}.nav-link{font-size:0.8rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--on-surface-muted);white-space:nowrap}.nav-link:hover,.nav-link.active{color:var(--on-surface)}.nav-collapsed .nav-links{display:none!important}.nav-collapsed .mobile-toggle{display:flex!important}.mobile-toggle{display:none;padding:8px;cursor:pointer;background:transparent;border:1px solid var(--outline);border-radius:4px;color:var(--on-surface);font-size:1.2rem;line-height:1;min-width:48px;min-height:48px;align-items:center;justify-content:center}.cv-btn{padding:6px 14px;cursor:pointer;background:transparent;border:1px solid var(--outline);border-radius:4px;font-family:var(--font-sans);font-size:0.75rem;font-weight:600;letter-spacing:0.05em;color:var(--on-surface);text-transform:uppercase;min-height:48px;display:flex;align-items:center;justify-content:center;white-space:nowrap}.cv-btn:hover{background:var(--surface-variant);border-color:var(--outline-hover)}.theme-toggle{padding:6px 14px;cursor:pointer;background:transparent;border:1px solid var(--outline);border-radius:4px;font-family:var(--font-sans);font-size:0.75rem;font-weight:600;letter-spacing:0.05em;color:var(--on-surface);text-transform:uppercase;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center}.theme-toggle:hover{background:var(--surface-variant);border-color:var(--outline-hover)}.section-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,var(--outline-hover),transparent);margin:0 auto;max-width:400px}

    .overflow-hidden{overflow:hidden!important}.hero{display:grid;grid-template-columns:1.2fr 0.8fr;min-height:100vh;align-items:center;gap:clamp(16px,4vw,48px);padding:48px 0}.hero-text{display:flex;flex-direction:column;gap:clamp(4px,1.5vw,12px)}.hero-tag{font-size:0.8rem;font-weight:600;color:var(--secondary);letter-spacing:0.15em}.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700}.hero h1 span{color:var(--primary)}.hero-tagline{font-size:clamp(1.2rem,3vw,2rem);font-weight:500;color:var(--on-surface)}.hero-desc{font-size:1rem;color:var(--on-surface-muted);max-width:500px;font-weight:400;line-height:1.6}.hero-img{border-radius:8px;width:100%;aspect-ratio:4/5;object-fit:cover;border:1px solid var(--outline)}

    section{min-height:100vh;display:flex;align-items:center;border-bottom:1px solid var(--outline);padding:48px 0}.section-header{margin-bottom:32px}.section-header p{font-size:0.75rem;color:var(--secondary);font-weight:600;letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase}.section-header h2{font-size:1.8rem;font-weight:500}.bio-content{max-width:800px}.bio-text{font-size:1.35rem;font-weight:300;line-height:1.6}.bio-text span{color:var(--primary)}

    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.card{background:var(--surface-variant);padding:32px;border-radius:8px;border:1px solid var(--outline);display:flex;flex-direction:column;justify-content:space-between;min-height:200px}.card:hover{border-color:var(--outline-hover)}.card h3{font-size:1.2rem;font-weight:500;margin-bottom:16px}.card p{color:var(--on-surface-muted);font-size:0.9rem}

    .pub-list{display:flex;flex-direction:column}.pub-row{padding:24px 0;border-bottom:1px solid var(--outline);display:flex;justify-content:space-between;align-items:center;gap:24px}.pub-row:last-child{border-bottom:none}.pub-title{font-size:1.05rem;font-weight:500}.pub-meta{color:var(--on-surface-muted);font-size:0.85rem;margin-left:12px}.pub-link{font-size:0.85rem;font-weight:600;letter-spacing:0.05em;border:1px solid var(--outline);padding:6px 16px;border-radius:4px;display:inline-block;min-height:48px;display:flex;align-items:center}.pub-link:hover{background:var(--surface-variant);border-color:var(--outline-hover)}

    .project-item{position:relative;overflow:hidden;border-radius:8px;border:1px solid var(--outline);aspect-ratio:4/3}.project-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease}.project-item:hover img{transform:scale(1.03)}

    .field-notes{background-color:var(--surface-variant);border-radius:8px;border:1px solid var(--outline);padding:40px}.note-meta{font-size:0.8rem;color:var(--secondary);font-weight:600;letter-spacing:0.05em;margin-bottom:12px}.note-text{font-size:1.1rem;font-weight:400;color:var(--on-surface)}

    .cta-wrapper{padding:40px 0 100px 0;border:none}.cta-box{background:var(--surface-variant);border:1px solid var(--outline);padding:64px 40px;text-align:center;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:20px}.cta-box h2{font-size:2rem;font-weight:500}.cta-box p{color:var(--on-surface-muted);font-size:1.1rem}.cta-btn{background-color:var(--on-surface);color:var(--surface);padding:12px 32px;border-radius:4px;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;border:none;cursor:pointer;font-family:var(--font-sans);transition:opacity 0.2s ease;min-height:48px;text-decoration:none;display:inline-flex;align-items:center}.cta-btn:hover{opacity:0.9;color:var(--surface)}

    footer{padding:48px 0;border-top:1px solid var(--outline);text-align:center;color:var(--on-surface-muted);font-size:0.75rem;letter-spacing:0.1em;display:none}.footer-name{font-family:var(--font-display);font-weight:700;font-size:0.9rem;color:var(--on-surface);margin-bottom:4px}.footer-tagline{font-size:0.7rem;margin-bottom:16px}.footer-links{display:flex;justify-content:center;gap:24px}.footer-link{color:var(--on-surface-muted);font-size:0.75rem;font-weight:600}.footer-link:hover{color:var(--on-surface)}

    @media(max-width:900px){.hero{grid-template-columns:1fr;text-align:center;min-height:100vh;padding:32px 24px;display:flex;flex-direction:column;justify-content:center;gap:32px}.hero-text{align-items:center}.hero-desc{margin:0 auto}.hero-img{max-height:30vh;aspect-ratio:16/9;width:100%}.grid-3{grid-template-columns:1fr}.pub-row{flex-direction:column;align-items:flex-start;gap:12px}.pub-link{align-self:flex-start}}

    @media(max-width:768px){.nav-links{display:none}.nav-right .cv-btn,.nav-right .theme-toggle{display:none}.mobile-toggle{display:flex}.container{padding:0 24px}section{min-height:100vh;padding:40px 0}.section-header h2{font-size:1.4rem}.cta-box{padding:40px 24px}.mobile-actions{display:flex;gap:12px;margin-top:24px}.mobile-actions .cv-btn,.mobile-actions .theme-toggle{font-size:0.9rem;padding:10px 20px}}
  </style>
</head>
<body>
  <nav>
    <div class="container nav-container">
      <div class="nav-logo" id="brandName"></div>
      <div class="nav-right">
        <div class="nav-links"></div>
        <button class="cv-btn"></button>
        <button data-toggle-theme class="theme-toggle" aria-label="Toggle theme"><img src="assets/images/dark_mode.svg" alt="Toggle theme" width="20" height="20" id="themeIcon"></button>
        <button class="mobile-toggle" aria-label="Open menu">&#9776;</button>
      </div>
    </div>
  </nav>

  <div class="mobile-overlay">
    <button class="mobile-close" aria-label="Close menu">&#10005;</button>
    <div class="mobile-actions">
      <button class="cv-btn"></button>
      <button data-toggle-theme class="theme-toggle" aria-label="Toggle theme"><img src="assets/images/dark_mode.svg" alt="Toggle theme" width="20" height="20" id="themeIcon"></button>
    </div>
  </div>

  <main class="container" id="app"></main>

  <footer>
    <div class="container">
      <div class="footer-name"></div>
      <div class="footer-tagline"></div>
      <div class="footer-links"></div>
    </div>
  </footer>

  <script src="js/utils/helpers.js"></script>
  <script src="js/components/renderers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
